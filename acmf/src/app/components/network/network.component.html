<div class="sm:p-6 w-full overflow-x-hidden">

  <!-- Tabs -->
  <div class="relative">
    <!-- Fade edges on mobile to hint scrollability -->
    <div class="absolute left-0 top-0 bottom-0 w-6 bg-gradient-to-r from-white to-transparent z-10 pointer-events-none sm:hidden"></div>
    <div class="absolute right-0 top-0 bottom-0 w-6 bg-gradient-to-l from-white to-transparent z-10 pointer-events-none sm:hidden"></div>

    <nav
      #tabNav
      class="flex gap-1 sm:gap-2 border-b border-gray-100 overflow-x-auto py-2 scroll-smooth"
      style="-webkit-overflow-scrolling: touch; scrollbar-width: none; -ms-overflow-style: none;"
    >
      <button
        *ngFor="let tab of tabs"
        #tabBtn
        (click)="selectTab(tab.key)"
        class="group relative flex-shrink-0 px-3 sm:px-4 py-2 text-xs sm:text-sm font-semibold whitespace-nowrap transition-all duration-300 rounded-lg overflow-hidden flex items-center gap-1.5"
        [ngClass]="
          selectedTab === tab.key
            ? 'text-white shadow-md'
            : 'text-gray-500 hover:text-gray-900 hover:bg-gray-50'
        "
      >
        <!-- Active gradient pill -->
        <div
          *ngIf="selectedTab === tab.key"
          class="absolute inset-0 bg-gradient-to-r from-blue-500 to-purple-600 z-0 animate-fadeIn"
        ></div>

        <i [class]="tab.icon + ' relative z-10 text-base'"></i>
        <span class="relative z-10">{{ tab.label }}</span>

        <!-- Hover underline for inactive tabs -->
        <span
          *ngIf="selectedTab !== tab.key"
          class="absolute bottom-1 left-1/2 w-0 h-0.5 bg-gradient-to-r from-blue-400 to-purple-500 transition-all duration-300 group-hover:w-1/2 group-hover:-translate-x-1/2"
        ></span>
      </button>
    </nav>
  </div>

  <!-- Tab context header -->
  <div class="mt-4 mb-3 flex items-center justify-between" *ngIf="!loading">
    <div>
      <p class="text-xs text-gray-400 font-semibold uppercase tracking-widest">
        {{ activeTab.description }}
      </p>
      <p class="text-xs text-gray-300 mt-0.5">
        {{ displayedProfiles.length }} {{ displayedProfiles.length === 1 ? 'person' : 'people' }} found
      </p>
    </div>
  </div>

  <!-- Skeleton Loader -->
  <div
    *ngIf="loading"
    class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 mt-4"
  >
    <div
      *ngFor="let i of [1, 2, 3, 4, 5, 6]"
      class="p-5 border border-gray-100 rounded-xl shadow-sm animate-pulse bg-white"
    >
      <div class="flex items-center gap-3 mb-4">
        <div class="w-14 h-14 rounded-full bg-gray-200 flex-shrink-0"></div>
        <div class="flex-1">
          <div class="h-3.5 bg-gray-200 rounded w-3/4 mb-2"></div>
          <div class="h-3 bg-gray-200 rounded w-1/2"></div>
        </div>
      </div>
      <div class="h-3 bg-gray-200 rounded w-full mb-2"></div>
      <div class="h-3 bg-gray-200 rounded w-5/6 mb-4"></div>
      <div class="flex gap-2">
        <div class="h-6 bg-gray-200 rounded-full w-16"></div>
        <div class="h-6 bg-gray-200 rounded-full w-20"></div>
      </div>
      <div class="h-8 bg-gray-200 rounded-full w-full mt-4"></div>
    </div>
  </div>

  <!-- Empty State -->
  <div
    *ngIf="!loading && displayedProfiles.length === 0"
    class="flex flex-col items-center justify-center py-20 text-center"
  >
    <div class="w-16 h-16 rounded-full bg-gray-100 flex items-center justify-center mb-4">
      <i class="ri-user-search-line text-3xl text-gray-300"></i>
    </div>
    <p class="text-sm font-semibold text-gray-500 mb-1">No suggestions found</p>
    <p class="text-xs text-gray-400 max-w-xs leading-relaxed">
      Complete your profile with your skills, interests, and course details to unlock better connections.
    </p>
    <button
      (click)="invalidateCacheAndReload()"
      class="mt-4 text-xs text-blue-500 font-medium hover:underline flex items-center gap-1"
    >
      <i class="ri-refresh-line"></i> Refresh
    </button>
  </div>

  <!-- Profiles Grid -->
  <div
    *ngIf="!loading && displayedProfiles.length > 0"
    class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 mt-1"
  >
    <app-student-card
      *ngFor="let profile of displayedProfiles; trackBy: trackByUserId"
      [profile]="profile"
      [isFollowing]="isUserFollowing(profile.userId)"
      (follow)="followUser($event)"
      (unfollow)="unfollowUser($event)"
    ></app-student-card>
  </div>

</div>
