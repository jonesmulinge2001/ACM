<!-- Bell button -->
<div class="relative inline-block">
  <button
    (click)="toggleMenu()"
    [ngClass]="menuOpen ? 'bg-black/10' : 'hover:bg-black/5'"
    class="relative p-2 rounded-full flex items-center justify-center text-[rgba(0,0,0,0.6)] transition-colors duration-150 hover:bg-[rgba(0,0,0,0.08)] hover:text-[rgba(0,0,0,0.9)]"
  >
    <span class="material-icons text-[24px]">notifications</span>

    <span
      *ngIf="unreadCount > 0"
      class="absolute top-1 right-1 min-w-[16px] h-[16px] bg-[#CC1016] text-white text-[10px] font-bold rounded-full flex items-center justify-center px-[3px] leading-none border-[1.5px] border-[#f3f2ef]"
    >
      {{ unreadCount > 99 ? '99+' : unreadCount }}
    </span>
  </button>

  <!-- Dropdown panel -->
  <div
    *ngIf="menuOpen"
    #notificationMenu
    class="absolute right-0 mt-1 w-[360px] bg-white rounded-lg border border-[#e0ddd8] shadow-[0_4px_12px_rgba(0,0,0,0.15)] z-50 flex flex-col overflow-hidden max-md:fixed max-md:top-[60px] max-md:left-4 max-md:right-4 max-md:w-auto"
  >

    <!-- HEADER -->
    <div class="flex items-center justify-between px-4 py-3 border-b border-[#e0ddd8]">
      <h3 class="text-[16px] font-semibold text-[rgba(0,0,0,0.9)] m-0">
        Notifications
      </h3>

      <div class="flex items-center gap-1">

        <button
          *ngIf="unreadCount > 0"
          (click)="markAllAsRead($event)"
          [disabled]="markingAllAsRead"
          class="text-[12px] font-semibold px-2 py-1 rounded hover:bg-black/5"
        >
          <span class="material-icons text-[16px]">done_all</span>
        </button>

        <button
          (click)="refresh()"
          class="text-[rgba(0,0,0,0.6)] hover:bg-black/5 p-1 rounded"
        >
          <span class="material-icons text-[18px]">refresh</span>
        </button>

        <button
          (click)="closeMenu()"
          class="md:hidden text-[rgba(0,0,0,0.6)] hover:bg-black/5 p-1 rounded"
        >
          <span class="material-icons text-[18px]">close</span>
        </button>

      </div>
    </div>

    <!-- LIST -->
    <div
      #notificationList
      class="overflow-y-auto flex-1 max-h-[460px] relative"
      (scroll)="onScroll($event)"
    >

      <ng-container *ngIf="notifications.length > 0; else noNotifications">

        <ng-container *ngFor="let notification of notifications">

          <!-- ROW -->
          <div
            class="relative flex items-start gap-3 px-4 py-3 border-b border-[#e0ddd8] cursor-pointer"
            [ngClass]="notification.seen
              ? 'bg-white hover:bg-gray-50'
              : 'bg-[#EEF3F8] hover:bg-[#dce6f0]'"
            (click)="handleNotificationClick(notification, $event)"
          >

            <!-- unread bar -->
            <span
              *ngIf="!notification.seen"
              class="absolute left-0 top-0 bottom-0 w-[3px] bg-[#0A66C2]"
            ></span>

            <!-- AVATARS -->
            <div class="flex items-center -space-x-2 flex-shrink-0 pt-0.5 relative">

              <img
                *ngFor="let p of notification.actorProfiles?.slice(0, 3)"
                [src]="p.profileImage || 'https://via.placeholder.com/40'"
                class="w-9 h-9 rounded-full border-2 border-white object-cover shadow-sm"
              />

              <div
                *ngIf="(notification.actorProfiles?.length || 0) > 3"
                (click)="togglePreview(notification.id, $event)"
                class="w-9 h-9 rounded-full bg-gray-200 text-xs flex items-center justify-center border-2 border-white shadow-sm cursor-pointer hover:bg-gray-300 transition"
              >
                +{{ (notification.actorProfiles?.length || 0) - 3 }}
              </div>

              <!-- PREVIEW POPOVER -->
              <div
                *ngIf="activePreviewId === notification.id"
                class="absolute left-0 top-12 w-64 bg-white border border-gray-200 shadow-lg rounded-lg p-2 z-50"
              >
                <div
                  *ngFor="let p of notification.actorProfiles"
                  class="flex items-center gap-2 py-1"
                >
                  <img
                    [src]="p.profileImage || 'https://via.placeholder.com/40'"
                    class="w-6 h-6 rounded-full object-cover"
                  />
                  <span class="text-xs text-gray-700 font-medium">
                    {{ p.name }}
                  </span>
                </div>
              </div>

            </div>

            <!-- CONTENT -->
            <div class="flex-1 min-w-0">
              <p class="text-[14px] text-[rgba(0,0,0,0.9)] mb-1 line-clamp-2">
                {{ notification.message }}
              </p>

              <div class="flex items-center gap-2">
                <span class="text-[12px] text-gray-500 font-semibold">
                  {{ formatTime(notification.createdAt) }}
                </span>

                <span
                  *ngIf="notification.count > 1"
                  class="text-[11px] px-2 py-0.5 rounded-full bg-[#dce6f0] text-[#0A66C2]"
                >
                  +{{ notification.count - 1 }}
                </span>
              </div>
            </div>

            <!-- mark read -->
            <button
              *ngIf="!notification.seen"
              (click)="markAsRead(notification.id, $event)"
              class="text-[#0A66C2] hover:bg-[#dce6f0] p-1 rounded-full"
            >
              <span class="material-icons text-[18px]">check_circle</span>
            </button>

          </div>

        </ng-container>

      </ng-container>

      <!-- EMPTY -->
      <ng-template #noNotifications>
        <div class="py-12 text-center text-gray-400">
          No notifications yet
        </div>
      </ng-template>

    </div>

    <!-- FOOTER -->
    <div class="px-4 py-2 border-t border-[#e0ddd8] text-center">
      <button
        routerLink="/notifications"
        (click)="closeMenu()"
        class="text-sm font-semibold text-gray-600 hover:text-black"
      >
        View all notifications
      </button>
    </div>

  </div>

  <!-- BACKDROP -->
  <div
    *ngIf="menuOpen"
    class="fixed inset-0 z-40 md:hidden bg-black/40"
    (click)="closeMenu()"
  ></div>

</div>
