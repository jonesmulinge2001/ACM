<!-- Bell button -->
<div class="relative inline-block">
  <!-- Trigger Button -->
  <button
    (click)="toggleMenu()"
    [class.menu-open]="menuOpen"
    class="notif-trigger relative p-2 rounded-full flex items-center justify-center transition-all duration-200 ease-out text-[rgba(0,0,0,0.55)] hover:text-[rgba(0,0,0,0.9)] hover:bg-black/[0.07] focus:outline-none focus-visible:ring-2 focus-visible:ring-[#0A66C2]/50"
  >
    <!-- Bell icon with shake animation when unread -->
    <span
      class="material-icons text-[22px] transition-transform duration-200"
      [class.bell-ring]="unreadCount > 0 && !menuOpen"
    >
      notifications
    </span>

    <!-- Badge -->
    <span
      *ngIf="unreadCount > 0"
      class="badge absolute top-[4px] right-[4px] min-w-[16px] h-[16px] bg-[#CC1016] text-white text-[9px] font-bold rounded-full flex items-center justify-center px-[3px] leading-none border-[1.5px] border-white pointer-events-none"
    >
      {{ unreadCount > 99 ? "99+" : unreadCount }}
    </span>
  </button>

  <!-- ── Dropdown Panel ───────────────────────────────────── -->
  <div
    *ngIf="menuOpen"
    #notificationMenu
    class="notif-panel absolute right-0 mt-2 w-[380px] bg-white rounded-xl border border-black/[0.08] shadow-[0_8px_32px_rgba(0,0,0,0.14),0_2px_8px_rgba(0,0,0,0.08)] z-50 flex flex-col overflow-hidden max-md:fixed max-md:top-[56px] max-md:left-3 max-md:right-3 max-md:w-auto"
  >
    <!-- ── Header ─────────────────────────────────────────── -->
    <div
      class="flex items-center justify-between px-4 py-3 border-b border-black/[0.07] bg-white sticky top-0 z-10"
    >
      <div class="flex items-center gap-2">
        <h3
          class="text-[15px] font-semibold text-[rgba(0,0,0,0.9)] m-0 tracking-[-0.01em]"
        >
          Notifications
        </h3>
        <span
          *ngIf="unreadCount > 0"
          class="inline-flex items-center justify-center text-[10px] font-bold h-[18px] min-w-[18px] px-1.5 rounded-full bg-[#0A66C2]/10 text-[#0A66C2]"
        >
          {{ unreadCount }}
        </span>
      </div>

      <div class="flex items-center gap-0.5">
        <!-- Mark all read -->
        <button
          *ngIf="unreadCount > 0"
          (click)="markAllAsRead($event)"
          [disabled]="markingAllAsRead"
          title="Mark all as read"
          class="icon-btn group flex items-center gap-1 px-2 py-1.5 rounded-lg text-[12px] font-semibold text-[#0A66C2] hover:bg-[#0A66C2]/[0.08] transition-all duration-150 disabled:opacity-50"
        >
          <span
            class="material-icons text-[16px] transition-transform duration-200 group-hover:scale-110"
            >done_all</span
          >
        </button>

        <!-- Refresh -->
        <button
          (click)="refresh()"
          [class.spin]="loading"
          title="Refresh"
          class="icon-btn p-1.5 rounded-lg text-[rgba(0,0,0,0.45)] hover:text-[rgba(0,0,0,0.8)] hover:bg-black/[0.06] transition-all duration-150"
        >
          <span class="material-icons text-[18px]">refresh</span>
        </button>

        <!-- Close (mobile only) -->
        <button
          (click)="closeMenu()"
          class="md:hidden icon-btn p-1.5 rounded-lg text-[rgba(0,0,0,0.45)] hover:text-[rgba(0,0,0,0.8)] hover:bg-black/[0.06] transition-all duration-150"
        >
          <span class="material-icons text-[18px]">close</span>
        </button>
      </div>
    </div>

    <!-- ── List ───────────────────────────────────────────── -->
    <div
      #notificationList
      class="overflow-y-auto flex-1 max-h-[480px] scroll-smooth"
      (scroll)="onScroll($event)"
    >
      <ng-container *ngIf="notifications.length > 0; else noNotifications">
        <div
          *ngFor="let notification of notifications; let i = index"
          class="notif-item relative flex items-start gap-3 px-4 py-3.5 border-b border-black/[0.05] cursor-pointer group transition-all duration-150"
          [class.unread]="!notification.seen"
          [style.animation-delay]="i * 30 + 'ms'"
          (click)="handleNotificationClick(notification, $event)"
        >
          <!-- Unread accent bar -->
          <span
            *ngIf="!notification.seen"
            class="absolute left-0 top-0 bottom-0 w-[3px] bg-[#0A66C2] rounded-r-full transition-all duration-200"
          >
          </span>

          <!-- ── Avatars ──────────────────────────────────── -->
          <div class="relative flex-shrink-0 pt-0.5">
            <!-- Avatar stack -->
            <div class="flex items-center">
              <ng-container
                *ngFor="
                  let p of notification.actorProfiles?.slice(0, 3);
                  let ai = index
                "
              >
                <img
                  [src]="p.profileImage || 'https://via.placeholder.com/40'"
                  [style.z-index]="3 - ai"
                  [style.margin-left]="ai > 0 ? '-10px' : '0'"
                  class="w-9 h-9 rounded-full border-2 border-white object-cover shadow-sm transition-transform duration-150 group-hover:scale-[1.03]"
                  [alt]="p.name"
                />
              </ng-container>

              <!-- Overflow count -->
              <div
                *ngIf="(notification.actorProfiles?.length || 0) > 3"
                (click)="togglePreview(notification.id, $event)"
                style="margin-left: -10px; z-index: 0"
                class="relative w-9 h-9 rounded-full bg-[#e8e8e8] text-[11px] font-semibold text-[rgba(0,0,0,0.7)] flex items-center justify-center border-2 border-white shadow-sm cursor-pointer hover:bg-[#d4d4d4] transition-colors duration-150"
              >
                +{{ (notification.actorProfiles?.length || 0) - 3 }}
              </div>
            </div>

            <!-- Preview Popover -->
            <div
              *ngIf="activePreviewId === notification.id"
              class="preview-popover absolute left-0 top-12 w-60 bg-white border border-black/[0.1] shadow-[0_4px_20px_rgba(0,0,0,0.13)] rounded-xl p-2 z-50"
            >
              <p
                class="text-[10px] font-semibold uppercase tracking-wider text-gray-400 px-2 mb-1"
              >
                Actors
              </p>
              <div
                *ngFor="let p of notification.actorProfiles"
                class="flex items-center gap-2.5 px-2 py-1.5 rounded-lg hover:bg-gray-50 transition-colors duration-100"
              >
                <img
                  [src]="p.profileImage || 'https://via.placeholder.com/40'"
                  class="w-7 h-7 rounded-full object-cover border border-black/10"
                />
                <span
                  class="text-[12px] text-[rgba(0,0,0,0.85)] font-medium truncate"
                  >{{ p.name }}</span
                >
              </div>
            </div>
          </div>

          <!-- ── Content ─────────────────────────────────── -->
          <div class="flex-1 min-w-0">
            <p
              class="text-[13.5px] leading-snug text-[rgba(0,0,0,0.85)] mb-1.5 line-clamp-2"
              [class.font-medium]="!notification.seen"
            >
              {{ notification.message }}
            </p>

            <div class="flex items-center gap-2 flex-wrap">
              <span class="text-[11.5px] text-[rgba(0,0,0,0.45)] font-medium">
                {{ formatTime(notification.createdAt) }}
              </span>

              <span
                *ngIf="notification.count > 1"
                class="inline-flex items-center text-[10.5px] px-2 py-0.5 rounded-full bg-[#dce6f0] text-[#0A66C2] font-semibold"
              >
                +{{ notification.count - 1 }} more
              </span>
            </div>
          </div>

          <!-- ── Mark-read button ────────────────────────── -->
          <button
            *ngIf="!notification.seen"
            (click)="markAsRead(notification.id, $event)"
            title="Mark as read"
            class="mark-read-btn flex-shrink-0 opacity-0 group-hover:opacity-100 p-1.5 rounded-full text-[#0A66C2] hover:bg-[#0A66C2]/[0.1] transition-all duration-150 mt-0.5"
          >
            <span class="material-icons text-[17px]">check_circle</span>
          </button>
        </div>
      </ng-container>

      <!-- Loading more spinner -->
      <div *ngIf="loadingMore" class="flex justify-center py-4">
        <span
          class="w-5 h-5 border-2 border-[#0A66C2]/30 border-t-[#0A66C2] rounded-full animate-spin block"
        ></span>
      </div>

      <!-- Empty state -->
      <ng-template #noNotifications>
        <div class="flex flex-col items-center justify-center py-16 px-6 gap-3">
          <span class="material-icons text-[40px] text-gray-200"
            >notifications_off</span
          >
          <p
            class="text-[13px] text-gray-400 font-medium text-center leading-relaxed"
          >
            You're all caught up!<br />
            <span class="text-gray-300 font-normal"
              >New notifications will appear here.</span
            >
          </p>
        </div>
      </ng-template>
    </div>

    <!-- ── Footer ─────────────────────────────────────────── -->
    <div
      class="px-4 py-2.5 border-t border-black/[0.07] bg-gray-50/60 text-center"
    >
      <button
        routerLink="/notifications"
        (click)="closeMenu()"
        class="text-[13px] font-semibold text-[rgba(0,0,0,0.55)] hover:text-[#0A66C2] transition-colors duration-150 py-0.5"
      >
        View all notifications →
      </button>
    </div>
  </div>

  <!-- Backdrop (mobile) -->
  <div
    *ngIf="menuOpen"
    class="backdrop fixed inset-0 z-40 md:hidden bg-black/40"
    (click)="closeMenu()"
  ></div>
</div>
