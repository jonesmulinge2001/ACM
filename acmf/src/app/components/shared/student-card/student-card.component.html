<div
  class="w-full bg-white border border-gray-200 rounded-lg p-4 transition-shadow cursor-pointer hover:shadow-md"
  (click)="navigateToProfile()"
>
  <!-- Header -->
  <div class="flex items-start justify-between gap-3">
    <div class="flex items-center gap-3 flex-1 min-w-0">
      <div class="relative flex-shrink-0">
        <img
          [src]="profile.profileImage || '/assets/default-avatar.png'"
          class="w-14 h-14 rounded-full object-cover border-2 border-white ring-1 ring-gray-200"
          alt="avatar"
        />
      </div>
      <div class="flex-1 min-w-0">
        <h3 class="text-sm font-semibold text-gray-900 truncate leading-tight hover:text-blue-700 transition-colors">
          {{ profile.name }}
        </h3>
        <p class="text-xs text-gray-500 truncate mt-0.5">
          {{ profile.academicLevel }} · {{ profile.institution?.name }}
        </p>
      </div>
    </div>

    <!-- Follow / Following Button -->
    <div (click)="$event.stopPropagation()" class="flex-shrink-0 mt-1">
      <button
        *ngIf="!followState"
        (click)="handleFollow()"
        [disabled]="isLoading"
        class="linkedin-follow-btn flex items-center gap-1.5 px-4 py-1.5 rounded-full border border-blue-600 text-blue-600 text-sm font-semibold hover:bg-blue-50 active:bg-blue-100 transition-all disabled:opacity-60"
      >
        <svg *ngIf="!isLoading" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4" />
        </svg>
        <svg *ngIf="isLoading" class="w-4 h-4 animate-spin" fill="none" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z"></path>
        </svg>
        Follow
      </button>

      <button
        *ngIf="followState"
        (click)="handleUnfollow()"
        [disabled]="isLoading"
        class="linkedin-following-btn group flex items-center gap-1.5 px-4 py-1.5 rounded-full border border-gray-400 text-gray-600 text-sm font-semibold hover:border-red-400 hover:text-red-600 hover:bg-red-50 active:bg-red-100 transition-all disabled:opacity-60"
      >
        <svg class="w-4 h-4 group-hover:hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
        </svg>
        <svg class="w-4 h-4 hidden group-hover:block" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
        </svg>
        <span class="group-hover:hidden">Following</span>
        <span class="hidden group-hover:inline">Unfollow</span>
      </button>
    </div>
  </div>

  <!-- Bio -->
  <div class="mt-3 text-xs text-gray-600 leading-relaxed" *ngIf="profile.bio">
    <p>
      {{ getShortBio(profile.bio) }}
      <button
        *ngIf="profile.bio && profile.bio.split(' ').length > 8"
        class="text-blue-600 font-medium hover:underline ml-0.5"
        (click)="toggleReadMore($event)"
      >
        {{ profile.showFullBio ? 'see less' : '...see more' }}
      </button>
    </p>
  </div>

  <!-- Skills -->
  <div class="mt-3 flex flex-wrap gap-1.5" *ngIf="profile.skills.length">
    <ng-container *ngFor="let skill of displayedSkills; let i = index">
      <span class="px-2.5 py-1 rounded-sm bg-blue-50 text-blue-700 text-xs font-medium border border-blue-100 hover:bg-blue-100 transition cursor-default">
        {{ skill }}
      </span>
    </ng-container>

    <button
      *ngIf="profile.skills.length > 3"
      class="px-2.5 py-1 text-xs text-gray-500 font-medium hover:text-blue-600 hover:underline transition"
      (click)="toggleSkills($event)"
    >
      {{ showAllSkills ? 'Show less' : '+' + (profile.skills.length - 3) + ' more' }}
    </button>
  </div>

  <!-- Footer -->
  <div class="mt-4 pt-3 border-t border-gray-100 flex items-center justify-between text-xs text-gray-400">
    <div class="flex gap-3">
      <span><strong class="text-gray-700">{{ displayFollowers }}</strong> followers</span>
      <span><strong class="text-gray-700">{{ profile.followingCount || 0 }}</strong> following</span>
    </div>
    <span>Joined {{ profile.createdAt | date: 'MMM yyyy' }}</span>
  </div>
</div>
