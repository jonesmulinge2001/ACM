<!-- Desktop Sidebar -->
<div class="hidden lg:flex flex-col fixed top-16 left-0 w-64 h-[calc(100vh-4rem)] bg-white border-r border-gray-100 z-30 shadow-sm">
  
  <div class="flex-1 overflow-y-auto scrollbar-hide p-3">

    <!-- Navigation Menu -->
    <ul class="space-y-0.5">
      <li *ngFor="let item of navItems">
        <a [routerLink]="item.link"
          class="group flex items-center gap-3 px-3 py-2.5 rounded-xl transition-all duration-200 cursor-pointer relative"
          [ngClass]="isActiveRoute(item.link)
            ? 'bg-blue-50 text-blue-600'
            : 'text-gray-600 hover:bg-gray-50 hover:text-gray-900'">

          <!-- Active left bar -->
          <span *ngIf="isActiveRoute(item.link)"
            class="absolute left-0 top-1/2 -translate-y-1/2 w-1 h-6 bg-blue-600 rounded-r-full">
          </span>

          <!-- Icon -->
          <span class="material-icons text-[1.35rem] flex-shrink-0 transition-all duration-200"
            [ngClass]="isActiveRoute(item.link)
              ? 'text-blue-600'
              : 'text-gray-400 group-hover:text-gray-700'">
            {{ item.icon }}
          </span>

          <!-- Label -->
          <span class="text-sm font-medium leading-none">{{ item.label }}</span>

          <!-- Active dot -->
          <span *ngIf="isActiveRoute(item.link)"
            class="ml-auto w-2 h-2 rounded-full bg-blue-600 flex-shrink-0">
          </span>
        </a>
      </li>
    </ul>

    <!-- Divider -->
    <div class="my-4 h-px bg-gray-100"></div>

    <!-- Quick Actions -->
    <div class="space-y-0.5">
      <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest px-3 mb-2">Quick Actions</p>

      <button (click)="openCreatePost()"
        class="w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium text-gray-600 hover:bg-blue-50 hover:text-blue-600 transition-all duration-200 group">
        <span class="w-8 h-8 rounded-lg bg-blue-100 group-hover:bg-blue-200 flex items-center justify-center flex-shrink-0 transition-colors">
          <span class="material-icons text-blue-600 text-[1.1rem]">edit</span>
        </span>
        Create a post
      </button>

      <button (click)="openSearch()"
        class="w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium text-gray-600 hover:bg-purple-50 hover:text-purple-600 transition-all duration-200 group">
        <span class="w-8 h-8 rounded-lg bg-purple-100 group-hover:bg-purple-200 flex items-center justify-center flex-shrink-0 transition-colors">
          <span class="material-icons text-purple-500 text-[1.1rem]">person_search</span>
        </span>
        Find people
      </button>
    </div>

    <!-- Divider -->
    <div class="my-4 h-px bg-gray-100"></div>

    <!-- Footer Links -->
    <div class="px-3 pb-4">
      <div class="flex flex-wrap gap-x-3 gap-y-1.5 text-[11px] text-gray-400">
        <a href="#" class="hover:text-blue-600 hover:underline transition-colors">About</a>
        <a href="#" class="hover:text-blue-600 hover:underline transition-colors">Privacy</a>
        <a href="#" class="hover:text-blue-600 hover:underline transition-colors">Terms</a>
        <a href="#" class="hover:text-blue-600 hover:underline transition-colors">Help</a>
      </div>
      <p class="text-[11px] text-gray-400 mt-2">© {{ currentYear }} Academeet</p>
    </div>

  </div>
</div>

<!-- Mobile Bottom Navigation -->
<div class="lg:hidden fixed bottom-0 left-0 right-0 bg-white/95 backdrop-blur-lg border-t border-gray-200 shadow-lg z-50">
  <div class="flex justify-around items-center py-1 px-2">
    <a *ngFor="let item of navItems" [routerLink]="item.link"
      class="flex flex-col items-center justify-center py-1.5 px-3 rounded-xl transition-all duration-200 relative min-w-[3.5rem]"
      [ngClass]="isActiveRoute(item.link)
        ? 'text-blue-600'
        : 'text-gray-400 hover:text-gray-700'">

      <!-- Active pill background -->
      <span *ngIf="isActiveRoute(item.link)"
        class="absolute inset-0 bg-blue-50 rounded-xl">
      </span>

      <!-- Active top indicator -->
      <span *ngIf="isActiveRoute(item.link)"
        class="absolute top-0 left-1/2 -translate-x-1/2 w-6 h-0.5 bg-blue-600 rounded-full">
      </span>

      <span class="material-icons relative z-10 transition-all duration-200 text-[1.5rem]"
        [ngClass]="isActiveRoute(item.link) ? 'text-blue-600' : 'text-gray-400'">
        {{ item.icon }}
      </span>

      <span class="relative z-10 text-[0.6rem] mt-0.5 font-medium leading-none"
        [ngClass]="isActiveRoute(item.link) ? 'text-blue-600' : 'text-gray-400'">
        {{ item.label }}
      </span>
    </a>
  </div>
</div>
