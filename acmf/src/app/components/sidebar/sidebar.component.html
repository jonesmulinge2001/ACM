<!-- Desktop Sidebar - LinkedIn Style -->
<div
  class="hidden lg:block fixed top-16 left-0 w-64 h-[calc(100vh-4rem)] overflow-y-auto bg-white shadow-lg border-r border-gray-200 z-30 transition-all duration-300"
>
  <div class="p-4">
    <!-- Navigation Menu -->
    <ul class="space-y-1">
      <li *ngFor="let item of navItems">
        <a
          [routerLink]="item.link"
          [ngClass]="{
            'active-nav-item': isActiveRoute(item.link),
            'inactive-nav-item': !isActiveRoute(item.link)
          }"
          class="group flex items-center gap-3 px-3 py-2.5 rounded-xl transition-all duration-200 cursor-pointer relative overflow-hidden"
        >
          <!-- Active Indicator -->
          <div *ngIf="isActiveRoute(item.link)" 
               class="absolute left-0 top-1/2 transform -translate-y-1/2 w-1 h-8 bg-gradient-to-b from-blue-500 to-purple-600 rounded-full"></div>
          
          <!-- Icon with Gradient -->
          <div class="relative">
            <span 
              class="material-icons text-xl transition-all duration-200"
              [ngClass]="{
                'text-blue-600': isActiveRoute(item.link),
                'text-gray-500 group-hover:text-blue-500': !isActiveRoute(item.link)
              }"
            >
              {{ item.icon }}
            </span>
            <div *ngIf="isActiveRoute(item.link)" 
                 class="absolute inset-0 animate-ping-slow opacity-0 group-hover:opacity-100"></div>
          </div>
          
          <!-- Label -->
          <span 
            class="text-sm font-medium transition-all duration-200"
            [ngClass]="{
              'text-gray-900': isActiveRoute(item.link),
              'text-gray-600 group-hover:text-gray-900': !isActiveRoute(item.link)
            }"
          >
            {{ item.label }}
          </span>
          
          <!-- Hover Background -->
          <div class="absolute inset-0 bg-gradient-to-r from-gray-50 to-transparent opacity-0 group-hover:opacity-100 rounded-xl transition-opacity duration-200 -z-10"></div>
        </a>
      </li>
    </ul>

    <!-- Divider -->
    <div class="my-4 h-px bg-gradient-to-r from-transparent via-gray-200 to-transparent"></div>

    <!-- Quick Actions -->
    <div class="space-y-2">
      <p class="text-xs font-semibold text-gray-400 uppercase tracking-wider px-3 mb-2">Quick Actions</p>
      
      <button
        (click)="openCreatePost()"
        class="w-full flex items-center gap-3 px-3 py-2 rounded-xl text-sm text-gray-600 hover:bg-gray-50 transition-all duration-200 group"
      >
        <span class="material-icons text-lg text-blue-500">add_circle</span>
        <span>Create a post</span>
      </button>
      
      <button
        (click)="openSearch()"
        class="w-full flex items-center gap-3 px-3 py-2 rounded-xl text-sm text-gray-600 hover:bg-gray-50 transition-all duration-200 group"
      >
        <span class="material-icons text-lg text-gray-400">search</span>
        <span>Find people</span>
      </button>
    </div>

    <!-- Divider -->
    <div class="my-4 h-px bg-gradient-to-r from-transparent via-gray-200 to-transparent"></div>

    <!-- Your Impact Card - Enhanced LinkedIn Style -->
    <div class="mt-4 p-4 rounded-xl bg-gradient-to-br from-blue-600 to-purple-700 shadow-lg overflow-hidden relative group">
      <!-- Animated Background -->
      <div class="absolute inset-0 bg-gradient-to-r from-white/10 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-500"></div>
      
      <h3 class="text-sm font-semibold text-white mb-4 flex items-center gap-2">
        <span class="material-icons text-white">insights</span>
        Your Impact
      </h3>
      
      <div class="space-y-3 text-sm">
        <div class="flex justify-between items-center group/item">
          <div class="flex items-center gap-2 text-white/90">
            <span class="material-icons text-base">visibility</span>
            <span>Profile Views</span>
          </div>
          <span class="font-semibold text-white group-hover/item:scale-110 transition-transform">1,456</span>
        </div>
        
        <div class="flex justify-between items-center group/item">
          <div class="flex items-center gap-2 text-white/90">
            <span class="material-icons text-base">upload</span>
            <span>Resources Shared</span>
          </div>
          <span class="font-semibold text-white group-hover/item:scale-110 transition-transform">12</span>
        </div>
        
        <div class="flex justify-between items-center group/item">
          <div class="flex items-center gap-2 text-white/90">
            <span class="material-icons text-base">group</span>
            <span>Connections</span>
          </div>
          <span class="font-semibold text-white group-hover/item:scale-110 transition-transform">234</span>
        </div>
        
        <div class="flex justify-between items-center group/item">
          <div class="flex items-center gap-2 text-white/90">
            <span class="material-icons text-base">groups</span>
            <span>Groups Created</span>
          </div>
          <span class="font-semibold text-white group-hover/item:scale-110 transition-transform">8</span>
        </div>
      </div>
      
      <!-- Decorative Element -->
      <div class="absolute -bottom-4 -right-4 w-20 h-20 bg-white/5 rounded-full blur-xl"></div>
    </div>

    <!-- Footer Links -->
    <div class="mt-6 px-3">
      <div class="flex flex-wrap gap-x-3 gap-y-1 text-xs text-gray-400">
        <a href="#" class="hover:text-gray-600 transition">About</a>
        <a href="#" class="hover:text-gray-600 transition">Privacy</a>
        <a href="#" class="hover:text-gray-600 transition">Terms</a>
        <a href="#" class="hover:text-gray-600 transition">Help</a>
      </div>
      <p class="text-xs text-gray-400 mt-3">© 2026 Academeet</p>
    </div>
  </div>
</div>

<!-- Mobile Bottom Navigation - LinkedIn Style -->
<div
  class="lg:hidden fixed bottom-0 left-0 right-0 bg-white/95 backdrop-blur-lg border-t border-gray-200 shadow-lg z-50 transition-all duration-300"
>
  <div class="flex justify-around items-center py-2 px-4">
    <a
      *ngFor="let item of navItems"
      [routerLink]="item.link"
      class="flex flex-col items-center justify-center transition-all duration-200 relative"
      [ngClass]="{
        'active-mobile-nav': isActiveRoute(item.link),
        'inactive-mobile-nav': !isActiveRoute(item.link)
      }"
    >
      <!-- Active Indicator Dot -->
      <div *ngIf="isActiveRoute(item.link)" 
           class="absolute -top-1 w-1 h-1 bg-blue-500 rounded-full"></div>
      
      <span
        class="material-icons text-[1.5rem] transition-all duration-200"
        [ngClass]="{
          'text-blue-600 scale-110': isActiveRoute(item.link),
          'text-gray-500 group-hover:text-blue-500': !isActiveRoute(item.link)
        }"
      >
        {{ item.icon }}
      </span>
      
      <span 
        class="text-[0.65rem] mt-0.5 transition-all duration-200"
        [ngClass]="{
          'text-blue-600 font-medium': isActiveRoute(item.link),
          'text-gray-500': !isActiveRoute(item.link)
        }"
      >
        {{ item.label }}
      </span>
      
      <!-- Ripple Effect -->
      <div *ngIf="isActiveRoute(item.link)" 
           class="absolute inset-0 bg-blue-100 rounded-full scale-0 animate-ripple"></div>
    </a>
  </div>
</div>
