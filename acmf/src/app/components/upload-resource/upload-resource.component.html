<div class="min-h-screen bg-gradient-to-br from-gray-50 via-white to-gray-100 py-10 px-4">
  
    <!-- Container -->
    <div class="max-w-2xl mx-auto">
  
      <!-- Header -->
      <div class="mb-8 text-center">
        <h1 class="text-2xl font-bold text-gray-900 tracking-tight">
          Academic Resource Upload
        </h1>
        <p class="text-sm text-gray-500 mt-1">
          Share learning materials with community of students
        </p>
      </div>
  
      <!-- Card -->
      <div class="bg-white border border-gray-200 rounded-2xl shadow-sm overflow-hidden">
  
        <!-- Top accent bar -->
        <div class="h-1 bg-gradient-to-r from-blue-600 via-indigo-500 to-purple-600"></div>
  
        <div class="p-6 space-y-5">
  
          <!-- Title -->
          <div>
            <label class="text-xs font-semibold text-gray-600 uppercase tracking-wider">
              Resource Title
            </label>
            <input
              type="text"
              [(ngModel)]="title"
              placeholder="e.g. Data Structures Lecture Notes"
              class="mt-1 w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl 
                     focus:outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white transition"
            />
          </div>
  
          <!-- Type -->
          <div>
            <label class="text-xs font-semibold text-gray-600 uppercase tracking-wider">
              Resource Type
            </label>
            <select
              [(ngModel)]="type"
              class="mt-1 w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl 
                     focus:outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white transition"
            >
              <option [value]="MaterialType.NOTES">Lecture Notes</option>
              <option [value]="MaterialType.PAST_PAPER">Past Papers</option>
              <option [value]="MaterialType.ASSIGNMENT">Assignments</option>
            </select>
          </div>
  
          <!-- File Upload -->
          <div>
            <label class="text-xs font-semibold text-gray-600 uppercase tracking-wider">
              Upload File
            </label>
  
            <div class="mt-2 border-2 border-dashed border-gray-300 rounded-xl p-6 text-center 
                        hover:border-blue-400 transition cursor-pointer">
  
              <input
                type="file"
                (change)="onFileSelected($event)"
                class="hidden"
                id="fileInput"
              />
  
              <label for="fileInput" class="cursor-pointer">
                <div class="text-gray-600">
                  <span class="material-icons text-3xl text-gray-400">cloud_upload</span>
                  <p class="mt-2 text-sm font-medium">
                    Click to upload or drag and drop
                  </p>
                  <p class="text-xs text-gray-400 mt-1">
                    PDF, DOCX, PPT (max 20MB)
                  </p>
                </div>
              </label>
            </div>
          </div>
  
          <!-- Divider -->
          <div class="flex items-center gap-3">
            <div class="h-px bg-gray-200 flex-1"></div>
            <span class="text-xs text-gray-400">OR</span>
            <div class="h-px bg-gray-200 flex-1"></div>
          </div>
  
          <!-- URL -->
          <div>
            <label class="text-xs font-semibold text-gray-600 uppercase tracking-wider">
              External File URL
            </label>
            <input
              type="text"
              [(ngModel)]="fileUrl"
              placeholder="https://drive.google.com/..."
              class="mt-1 w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl 
                     focus:outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white transition"
            />
          </div>
  
          <!-- Submit -->
          <button
            (click)="submit()"
            [disabled]="loading"
            class="w-full py-3 rounded-xl font-semibold text-white 
                   bg-gradient-to-r from-blue-600 to-indigo-600 
                   hover:from-blue-700 hover:to-indigo-700 
                   transition active:scale-[0.99] disabled:opacity-60"
          >
            {{ loading ? 'Uploading resource...' : 'Share Academic Resource' }}
          </button>
  
          <!-- Message -->
          <p *ngIf="message"
             class="text-center text-sm text-green-600 font-medium">
            {{ message }}
          </p>
  
        </div>
      </div>
  
      <!-- Footer hint -->
      <p class="text-center text-xs text-gray-400 mt-6">
        Ensure materials comply with institutional academic guidelines
      </p>
  
    </div>
  </div>
